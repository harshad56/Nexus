<svg xmlns="http://www.w3.org/2000/svg" viewBox="-2 3 94 94" width="100%" height="100%">
  <defs>
    <linearGradient id="ngrad-fav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <filter id="glow-fav">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotglow-fav">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon background: dark rounded square -->
  <rect x="0" y="5" width="90" height="90" rx="20" fill="#0F0E2A"/>
  <!-- Subtle border glow -->
  <rect x="0" y="5" width="90" height="90" rx="20" fill="none" stroke="url(#ngrad-fav)" stroke-width="1.5" opacity="0.8"/>
  <!-- Shadow layer behind -->
  <rect x="4" y="10" width="90" height="90" rx="20" fill="#4F46E5" opacity="0.15"/>

  <!-- N letterform inside icon -->
  <!-- Left vertical bar -->
  <rect x="18" y="23" width="13" height="54" rx="3" fill="url(#ngrad-fav)" filter="url(#glow-fav)"/>
  <!-- Right vertical bar -->
  <rect x="59" y="23" width="13" height="54" rx="3" fill="url(#ngrad-fav)" filter="url(#glow-fav)"/>
  <!-- Diagonal bar -->
  <polygon points="18,23 31,23 72,65 72,77 59,77 18,35" fill="url(#ngrad-fav)" filter="url(#glow-fav)"/>

  <!-- Cyan accent dot top right -->
  <circle cx="78" cy="19" r="7" fill="#22D3EE" filter="url(#dotglow-fav)" opacity="0.95"/>
</svg>
